  <!-- Subtexto -->
  <text x="256" y="485" font-size="24" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle" fill="#94a3b8" letter-spacing="3">MENTAL · TECHNICAL · IA</text>
</svg>
