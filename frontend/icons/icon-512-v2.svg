<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="90" fill="#0a0e1a"/>
  <!-- Borde dorado exterior -->
  <rect x="12" y="12" width="488" height="488" rx="80" fill="none" stroke="#d4af37" stroke-width="10"/>
