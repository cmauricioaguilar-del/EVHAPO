  <!-- Registro del Service Worker (PWA) + detección de actualizaciones -->
  <script>
    let _swReg = null;

    function _showUpdateBanner() {
      if (document.getElementById('update-banner')) return;
      const b = document.createElement('div');
      b.id = 'update-banner';
      b.innerHTML = `
        <div class="ub-text">
          <strong>🔄 Nueva versión disponible</strong>
          Hay mejoras listas para vos. ¡Actualizá en un toque!
        </div>
        <button class="ub-btn" onclick="_applyUpdate()">Actualizar</button>
        <button class="ub-close" onclick="this.parentElement.remove()" title="Más tarde">✕</button>`;
      document.body.appendChild(b);
    }

    function _applyUpdate() {
      if (_swReg && _swReg.waiting) {
        _swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
      } else {
        window.location.reload(true);
      }
    }

    // Cuando el SW nuevo toma control → recargar automáticamente
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }

    async function _checkVersion() {
      try {
        const r = await fetch('/api/version', { cache: 'no-store' });
        const { version } = await r.json();
        const stored = localStorage.getItem('mindev_srv_version');
        if (stored && stored !== version) {
          _showUpdateBanner();
        }
        localStorage.setItem('mindev_srv_version', version);
      } catch {}
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          _swReg = reg;

          // ¿Hay un SW nuevo esperando ya?
          if (reg.waiting) _showUpdateBanner();

          // Detectar cuando se descarga un SW nuevo
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                _showUpdateBanner();
              }
            });
          });

          // Forzar chequeo del SW cada 60 s (sin esto Chrome puede tardar 24 h)
          setInterval(() => reg.update(), 60_000);

          console.log('[PWA] Service Worker registrado:', reg.scope);
        } catch (err) {
          console.warn('[PWA] Error al registrar SW:', err);
        }

        // Chequeo de versión del servidor: inmediato y cada 5 min
        setTimeout(_checkVersion, 2000);
        setInterval(_checkVersion, 5 * 60_000);
      });
    }

    // Manejar shortcuts del manifiesto
    const params = new URLSearchParams(window.location.search);
    const shortcut = params.get('shortcut');
    if (shortcut && (shortcut === 'mental' || shortcut === 'technical')) {
      window.addEventListener('evhapo:ready', () => {
        if (typeof startNewTest === 'function') {
          startNewTest(shortcut);
        }
      }, { once: true });
    }

    // ── Detección iOS (beforeinstallprompt no existe en iOS Safari) ──────────
    window._pwaIsIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    window._pwaIsInstalled = window.matchMedia('(display-mode: standalone)').matches
                          || window.navigator.standalone === true;

    // ── Prompt diferido (Chrome/Edge/Android) ────────────────────────────────
    window._deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._deferredInstallPrompt = e;
      _pwaUpdateInstallBtn();
    });

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App instalada correctamente');
      window._deferredInstallPrompt = null;
      window._pwaIsInstalled = true;
      _pwaUpdateInstallBtn();
    });

    // ── Función global: muestra/oculta el botón según el estado real ─────────
    // Llamar después de cada render que incluya #pwa-install-btn
    window._pwaUpdateInstallBtn = function() {
      const btn = document.getElementById('pwa-install-btn');
      if (!btn) return;
      // No mostrar si ya está instalada
      if (window._pwaIsInstalled) { btn.style.display = 'none'; return; }
      // Mostrar si hay prompt disponible (Chrome/Android) o si es iOS
      if (window._deferredInstallPrompt || window._pwaIsIOS) {
        btn.style.display = 'inline-flex';
        btn.style.alignItems = 'center';
        btn.style.gap = '6px';
      } else {
        btn.style.display = 'none';
      }
    };

    // ── Acción de instalación ────────────────────────────────────────────────
    window.installPWA = async () => {
      if (window._pwaIsIOS) {
        // iOS: no hay API de instalación — mostrar instrucciones
        const lang = (typeof I18N !== 'undefined') ? I18N.lang : 'es';
        const msg = lang === 'en'
          ? 'To install: tap the Share button (□↑) at the bottom of Safari and select "Add to Home Screen".'
          : lang === 'pt'
          ? 'Para instalar: toque no botão Compartilhar (□↑) na barra inferior do Safari e selecione "Adicionar à Tela de Início".'
          : 'Para instalar: toca el botón Compartir (□↑) en la barra inferior de Safari y selecciona "Agregar a pantalla de inicio".';
        alert(msg);
        return;
      }
      if (!window._deferredInstallPrompt) return;
      window._deferredInstallPrompt.prompt();
      const { outcome } = await window._deferredInstallPrompt.userChoice;
      console.log('[PWA] Resultado de instalación:', outcome);
      if (outcome === 'accepted') window._deferredInstallPrompt = null;
    };
  </script>
