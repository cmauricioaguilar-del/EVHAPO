<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MindEV-IA – Diagnóstico Poker</title>
  <meta name="description" content="Diagnóstico mental y técnico para jugadores de Texas Hold'em. Identifica tus brechas y mejora tu juego." />
  <meta name="theme-color" content="#d4af37" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MindEV-IA" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Íconos -->
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

  <!-- Open Graph (para compartir en redes) -->
  <meta property="og:title" content="EVHAPO – Diagnóstico Poker" />
  <meta property="og:description" content="Descubre tu nivel real como jugador de Texas Hold'em. Test mental + técnico con plan de mejora personalizado." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/icon-512.svg" />

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading-screen">
      <div class="logo-anim">
        <img src="/icons/mindev-logo.png" alt="MindEV" class="logo-anim-img">
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <script src="js/utils/captcha.js"></script>
  <script src="js/utils/i18n.js"></script>
  <script src="js/data/questions.js"></script>
  <script src="js/data/questions_pt.js"></script>
  <script src="js/data/technical_questions.js"></script>
  <script src="js/data/technical_questions_pt.js"></script>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/report.js"></script>
  <script src="js/pages/landing.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/payment.js"></script>
  <script src="js/pages/test.js"></script>
  <script src="js/pages/results.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/tournament.js"></script>
  <script src="js/pages/admin-referrals.js"></script>
  <script src="js/app.js"></script>

  <!-- Registro del Service Worker (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[PWA] Service Worker registrado:', reg.scope))
          .catch(err => console.warn('[PWA] Error al registrar SW:', err));
      });
    }

    // Manejar shortcuts del manifiesto
    const params = new URLSearchParams(window.location.search);
    const shortcut = params.get('shortcut');
    if (shortcut && (shortcut === 'mental' || shortcut === 'technical')) {
      window.addEventListener('evhapo:ready', () => {
        if (typeof startNewTest === 'function') {
          startNewTest(shortcut);
        }
      }, { once: true });
    }

    // Mostrar botón "Instalar App" cuando el navegador lo permita
    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      // Mostrar botón de instalación si existe en el DOM
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'block';
    });

    window.installPWA = async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      console.log('[PWA] Resultado de instalación:', outcome);
      deferredInstallPrompt = null;
    };

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App instalada correctamente');
      deferredInstallPrompt = null;
    });
  </script>
</body>
</html>
